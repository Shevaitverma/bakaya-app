services:
  server:
    build: ./server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:' + process.env.PORT + '/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
